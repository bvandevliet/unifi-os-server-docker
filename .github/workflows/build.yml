name: Build

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      version:
        description: "UOS Server version (leave empty to use Dockerfile version)"
        required: false
        default: ""
      dry_run:
        description: "Skip push/manifest/release (validate extraction pipeline only)"
        type: boolean
        required: false
        default: false

env:
  FIRMWARE_API: https://fw-update.ubnt.com/api/firmware-latest

# ─── Job graph ────────────────────────────────────────────────────────────────
#
#   build (matrix: amd64 ‖ arm64) ── manifest
#
# Both matrix legs run in parallel on native runners. Version and image name
# are identical across arches; the manifest job reads them from job outputs
# (last matrix leg to complete wins, but the values are always the same).
#
# Registry: GHCR — uses the automatic GITHUB_TOKEN, no manual secrets required.
# Runners:  native ubuntu-24.04 / ubuntu-24.04-arm — no QEMU emulation needed.
# Actions:  only actions/checkout@v4 — zero third-party dependencies.
# Triggers: tag push (v*) from check-update.yml; workflow_dispatch for manual runs.
# ──────────────────────────────────────────────────────────────────────────────

jobs:
  # ---------------------------------------------------------------------------
  # 1. Extract the base image from the official installer and build the final
  #    image for each architecture on its native runner (matrix, parallel).
  # ---------------------------------------------------------------------------
  build:
    strategy:
      matrix:
        include:
          - runner:   ubuntu-24.04
            arch:     amd64
            platform: linux-x64
          - runner:   ubuntu-24.04-arm
            arch:     arm64
            platform: linux-arm64
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 30
    permissions:
      packages: write
    outputs:
      version: ${{ steps.resolve.outputs.version }}
      image:   ${{ steps.resolve.outputs.image }}
    steps:
      - uses: actions/checkout@v4

      - name: Resolve version and installer URL
        id: resolve
        run: bash .github/scripts/resolve-version.sh
        env:
          INPUT_VERSION: ${{ inputs.version }}
          ARCH_PLATFORM: ${{ matrix.platform }}

      - name: Install UOS Server
        run: bash .github/scripts/install-uos.sh
        env:
          DOWNLOAD_URL: ${{ steps.resolve.outputs.url }}

      - name: Load base image into Docker
        run: bash .github/scripts/load-base-image.sh

      - name: Build and push
        if: ${{ !inputs.dry_run }}
        run: bash .github/scripts/build-push.sh
        env:
          IMAGE:          ${{ steps.resolve.outputs.image }}
          VERSION:        ${{ steps.resolve.outputs.version }}
          ARCH:           ${{ matrix.arch }}
          REGISTRY_USER:  ${{ github.actor }}
          REGISTRY_TOKEN: ${{ github.token }}

  # ---------------------------------------------------------------------------
  # 2. Combine the per-arch images into a single multi-arch manifest and,
  #    when triggered by a version tag, create a GitHub Release.
  # ---------------------------------------------------------------------------
  manifest:
    if: ${{ !inputs.dry_run }}
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write   # needed for gh release create
      packages: write   # needed to push to GHCR
    env:
      VERSION: ${{ needs.build.outputs.version }}
      IMAGE:   ${{ needs.build.outputs.image }}
    steps:
      - uses: actions/checkout@v4

      - name: Create and push multi-arch manifest
        run: bash .github/scripts/create-manifest.sh
        env:
          REGISTRY_USER:  ${{ github.actor }}
          REGISTRY_TOKEN: ${{ github.token }}

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        run: gh release create "${{ github.ref_name }}" --generate-notes
        env:
          GH_TOKEN: ${{ github.token }}
